<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Produtividade</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container py-4">

<h2 class="text-center mb-4">Painel de Produtividade</h2>

<!-- META MENSAL -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h5 class="card-title">Meta Mensal</h5>

        <div class="row g-2">
            <div class="col-md-6">
                <input type="number" id="meta" placeholder="Digite a meta" class="form-control">
            </div>
            <div class="col-md-6">
                <button onclick="salvarMeta()" class="btn btn-primary w-100">
                    Salvar Meta
                </button>
            </div>
        </div>

        <p id="metaAtual" class="mt-3 fw-bold"></p>
    </div>
</div>

<!-- LIMPAR MÊS -->
<div class="text-end mb-4">
    <button onclick="limparGrafico()" class="btn btn-warning">
        Limpar Produção do Mês
    </button>
</div>

<!-- EXCLUIR DIA -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h5 class="card-title">Excluir Produção de um Dia</h5>

        <div class="row g-2">
            <div class="col-md-6">
                <input type="date" id="dataExcluir" class="form-control">
            </div>
            <div class="col-md-6">
                <button onclick="excluirDia()" class="btn btn-danger w-100">
                    Excluir Dia
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ADICIONAR PRODUÇÃO -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h5 class="card-title">Adicionar Produção do Dia</h5>

        <div class="row g-2">
            <div class="col-md-4">
                <input type="date" id="data" class="form-control">
            </div>
            <div class="col-md-4">
                <input type="number" id="producao" placeholder="Produção" class="form-control">
            </div>
            <div class="col-md-4">
                <button onclick="adicionarProducao()" class="btn btn-success w-100">
                    Adicionar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- RESUMO -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h5 class="card-title">Resumo</h5>

        <p>Total do mês: 
            <span id="totalMes" class="fw-bold">0</span>
        </p>

        <p>Percentual da meta: 
            <span id="percentual" class="fw-bold">0%</span>
        </p>
    </div>
</div>

<!-- SELECIONAR MÊS -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h5 class="card-title">Selecionar Mês</h5>

        <div class="row g-2">
            <div class="col-md-6">
                <input type="month" id="mesSelecionado" class="form-control">
            </div>
            <div class="col-md-6">
                <button onclick="trocarMes()" class="btn btn-secondary w-100">
                    Carregar Mês
                </button>
            </div>
        </div>
    </div>
</div>

<!-- GRÁFICO -->
<div class="card shadow-sm">
    <div class="card-body">
        <canvas id="grafico" style="height:400px;"></canvas>
    </div>

    
</div>

</div>

<script src="script.js"></script>

</body>
</html>
